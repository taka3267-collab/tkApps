<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>みんなの犬図鑑 管理画面</title>
<style>
  :root{--bg:#f4f5f8;--card:#fff;--brown:#8c6646;--text:#27241c;--sub:#8c7d6b;--line:#e7e2d8;--danger:#c0392b;--blue:#3367d6;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Hiragino Sans",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
  header{background:#fff;border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  header h1{font-size:18px;margin:0}
  .right{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--sub)}
  .dot{width:9px;height:9px;border-radius:50%;background:#bbb;display:inline-block;margin-right:5px}
  .dot.on{background:#2ecc71}
  .tag{display:inline-block;background:#efece5;color:var(--brown);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
  button{cursor:pointer;border:none;border-radius:8px;padding:9px 14px;font-weight:600;font-size:14px}
  .btn-google{background:var(--blue);color:#fff}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-light{background:#eceef3;color:var(--text)}
  .btn-sm{padding:6px 10px;font-size:13px}
  .wrap{max-width:1000px;margin:0 auto;padding:22px}
  .tabs{display:flex;gap:18px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .tabs button{background:none;border:none;padding:10px 2px;color:var(--sub);border-bottom:2px solid transparent;border-radius:0}
  .tabs button.active{color:var(--brown);border-bottom-color:var(--brown)}
  .badge{background:var(--danger);color:#fff;border-radius:20px;font-size:11px;padding:1px 7px;margin-left:5px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat .label{font-size:13px;color:var(--sub)}
  .stat .num{font-size:30px;font-weight:800;margin-top:4px}
  .stat .num.alert{color:var(--danger)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  .thumbs img{width:96px;height:96px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  .hidden-badge{background:#fdecea;color:var(--danger)}
  .muted{color:var(--sub);font-size:13px}
  .hide{display:none}
  .login{max-width:420px;margin:80px auto;text-align:center}
  input{padding:10px;border:1px solid var(--line);border-radius:8px;width:100%}
  h2{font-size:15px;margin:0 0 10px}
</style>
</head>
<body>
<header>
  <h1>🐾 みんなの犬図鑑 管理画面</h1>
  <div class="right">
    <span id="conn"><span class="dot"></span>未接続</span>
    <span id="adminTag" class="tag hide">管理者</span>
    <button id="loginBtn" class="btn-google" onclick="doLogin()">Googleでログイン</button>
    <button id="logoutBtn" class="btn-light btn-sm hide" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<div class="wrap">
  <!-- ログイン -->
  <div id="loginView" class="login">
    <div class="card">
      <h2>ログインが必要です</h2>
      <p class="muted">みんなの犬図鑑の管理画面です。許可された管理者だけが利用できます。</p>
      <p><button class="btn-google" onclick="doLogin()">Googleでログイン</button></p>
      <p id="loginErr" class="muted" style="color:var(--danger)"></p>
    </div>
  </div>

  <!-- 権限なし -->
  <div id="denyView" class="login hide">
    <div class="card">
      <h2>権限がありません</h2>
      <p class="muted">このGoogleアカウントには管理者権限がありません。<br>あなたのUIDを Firestore の <code>admins/{UID}</code> に登録してください。</p>
      <p class="muted">あなたのUID：<code id="myUid"></code></p>
    </div>
  </div>

  <!-- 管理 -->
  <div id="adminView" class="hide">
    <div class="tabs">
      <button id="tabDash" class="active" onclick="switchTab('dash')">ダッシュボード</button>
      <button id="tabReports" onclick="switchTab('reports')">通報<span id="repBadge" class="badge hide">0</span></button>
      <button id="tabReported" onclick="switchTab('reported')">通報された投稿</button>
      <button id="tabPosts" onclick="switchTab('posts')">投稿一覧</button>
    </div>
    <p class="muted" id="status"></p>
    <div id="dash"></div>
    <div id="list"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_P5O5LIHOu5Prn1xPWcHujBTxiKEHx0Q",
  authDomain: "dog-atlas-32e82.firebaseapp.com",
  projectId: "dog-atlas-32e82",
  storageBucket: "dog-atlas-32e82.firebasestorage.app",
  messagingSenderId: "912733425764",
  appId: "1:912733425764:ios:02e0bf4a358659619c8f71"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentTab='dash', isAdmin=false;

const REASONS={humanFace:'人の顔が写っている',personalInfo:'住所・表札など個人情報',unrelatedPerson:'背景に無関係の人',
  wrongBreed:'犬種が違う',notOwnDog:'飼い犬ではない画像',offensive:'不快・不適切',other:'その他'};
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmt(ts){try{return ts.toDate().toLocaleString('ja-JP');}catch(e){return '';}}

function doLogin(){
  const p=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p).catch(e=>{document.getElementById('loginErr').textContent='ログイン失敗：'+e.message;});
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(async user=>{
  const conn=document.getElementById('conn');
  document.getElementById('loginBtn').classList.toggle('hide', !!user);
  document.getElementById('logoutBtn').classList.toggle('hide', !user);
  if(!user){
    conn.innerHTML='<span class="dot"></span>未接続';
    show('login'); return;
  }
  conn.innerHTML='<span class="dot on"></span>'+esc(user.email||user.uid);
  document.getElementById('myUid').textContent=user.uid;
  // 管理者か判定（reports を読めるか試す）
  try{
    await db.collection('admins').doc(user.uid).get(); // 直接は読めない設計なので reports で判定
  }catch(e){}
  try{
    await db.collection('reports').limit(1).get();
    isAdmin=true;
    document.getElementById('adminTag').classList.remove('hide');
    show('admin'); switchTab('dash');
  }catch(e){
    isAdmin=false; show('deny');
  }
});

function show(which){
  document.getElementById('loginView').classList.toggle('hide', which!=='login');
  document.getElementById('denyView').classList.toggle('hide', which!=='deny');
  document.getElementById('adminView').classList.toggle('hide', which!=='admin');
}

function switchTab(t){
  currentTab=t;
  ['Dash','Reports','Reported','Posts'].forEach(x=>document.getElementById('tab'+x).classList.toggle('active', 'tab'+x==='tab'+t[0].toUpperCase()+t.slice(1)));
  document.getElementById('dash').classList.toggle('hide', t!=='dash');
  document.getElementById('list').classList.toggle('hide', t==='dash');
  if(t==='dash') loadDash(); else loadList();
}

async function loadDash(){
  const el=document.getElementById('dash'); el.innerHTML='<p class="muted">読み込み中…</p>';
  try{
    const [posts, reports] = await Promise.all([
      db.collection('dogPosts').get(),
      db.collection('reports').get()
    ]);
    let hidden=0, reported=0;
    posts.forEach(d=>{const p=d.data(); if(p.isHidden)hidden++; if((p.reportCount||0)>0)reported++;});
    document.getElementById('repBadge').textContent=reports.size;
    document.getElementById('repBadge').classList.toggle('hide', reports.size===0);
    el.innerHTML=`<div class="cards">
      <div class="stat"><div class="label">総投稿</div><div class="num">${posts.size}</div></div>
      <div class="stat"><div class="label">通報</div><div class="num ${reports.size?'alert':''}">${reports.size}</div></div>
      <div class="stat"><div class="label">通報された投稿</div><div class="num">${reported}</div></div>
      <div class="stat"><div class="label">非表示の投稿</div><div class="num">${hidden}</div></div>
    </div>
    <div class="card"><h2>使い方</h2><p class="muted">「通報」タブで通報内容を確認し、問題のある投稿を非表示にできます。「通報された投稿」タブでは通報が付いた投稿を一覧できます。</p></div>`;
  }catch(e){ el.innerHTML='<p class="muted">読み込みエラー：'+esc(e.message)+'</p>'; }
}

async function loadList(){
  const listEl=document.getElementById('list'), statusEl=document.getElementById('status');
  listEl.innerHTML=''; statusEl.textContent='読み込み中…';
  try{
    if(currentTab==='reports'){
      const snap=await db.collection('reports').orderBy('createdAt','desc').limit(100).get();
      statusEl.textContent='通報 '+snap.size+' 件';
      for(const doc of snap.docs) listEl.appendChild(await reportCard(doc.data()));
      if(snap.empty) listEl.innerHTML='<p class="muted">通報はありません。</p>';
    }else if(currentTab==='reported'){
      const snap=await db.collection('dogPosts').where('reportCount','>',0).orderBy('reportCount','desc').limit(100).get();
      statusEl.textContent='通報された投稿 '+snap.size+' 件';
      for(const doc of snap.docs) listEl.appendChild(postCard(doc.id, doc.data()));
      if(snap.empty) listEl.innerHTML='<p class="muted">通報された投稿はありません。</p>';
    }else{
      const snap=await db.collection('dogPosts').orderBy('createdAt','desc').limit(100).get();
      statusEl.textContent='投稿 '+snap.size+' 件（新しい順・最大100件）';
      for(const doc of snap.docs) listEl.appendChild(postCard(doc.id, doc.data()));
      if(snap.empty) listEl.innerHTML='<p class="muted">投稿はありません。</p>';
    }
  }catch(e){ statusEl.textContent='読み込みエラー：'+e.message; }
}

async function reportCard(r){
  const div=document.createElement('div'); div.className='card';
  div.innerHTML=`<div class="row"><span class="tag">${esc(REASONS[r.reason]||r.reason)}</span><span class="muted">${fmt(r.createdAt)}</span></div>
    ${r.detail?`<p>詳細：${esc(r.detail)}</p>`:''}<p class="muted">投稿ID：${esc(r.postId)}</p>
    <div class="postSlot"><button class="btn-light btn-sm">この投稿を表示</button></div>`;
  const slot=div.querySelector('.postSlot');
  slot.querySelector('button').onclick=async()=>{
    slot.innerHTML='<span class="muted">読み込み中…</span>';
    try{const ps=await db.collection('dogPosts').doc(r.postId).get();
      if(ps.exists){slot.innerHTML='';slot.appendChild(postCard(ps.id, ps.data()));}
      else slot.innerHTML='<span class="muted">投稿が見つかりません（削除済み）。</span>';
    }catch(e){slot.innerHTML='<span class="muted">取得エラー：'+esc(e.message)+'</span>';}
  };
  return div;
}
function imagesOf(p){const u=[];if(Array.isArray(p.images))p.images.forEach(im=>{if(im.remoteImageURL)u.push(im.remoteImageURL);});if(!u.length&&p.imageURL)u.push(p.imageURL);return u;}
function postCard(id,p){
  const div=document.createElement('div'); div.className='card';
  div.innerHTML=`<div class="row"><strong>${esc(p.dogName||'(名前なし)')}</strong>
    ${p.isHidden?'<span class="tag hidden-badge">非表示中</span>':''}
    <span class="muted">いいぬ ${p.iinuCount||0}・通報 ${p.reportCount||0}</span></div>
    <div class="thumbs">${imagesOf(p).map(u=>`<img src="${esc(u)}">`).join('')||'<span class="muted">画像なし</span>'}</div>
    ${p.comment?`<p>${esc(p.comment)}</p>`:''}<p class="muted">投稿者：${esc(p.userId||'')}</p>
    <div class="row"><button class="btn-danger btn-sm act-hide">${p.isHidden?'表示に戻す':'この投稿を非表示'}</button>
    <button class="btn-light btn-sm act-ban">このユーザーの投稿を全て非表示</button></div><p class="muted act-msg"></p>`;
  const msg=div.querySelector('.act-msg');
  div.querySelector('.act-hide').onclick=async e=>{const next=!p.isHidden;
    try{await db.collection('dogPosts').doc(id).update({isHidden:next,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      p.isHidden=next;e.target.textContent=next?'表示に戻す':'この投稿を非表示';msg.textContent=next?'非表示にしました。':'表示に戻しました。';
    }catch(err){msg.textContent='エラー：'+err.message;}};
  div.querySelector('.act-ban').onclick=async()=>{if(!p.userId){msg.textContent='投稿者IDがありません。';return;}
    if(!confirm('このユーザーの投稿を全て非表示にしますか？'))return;msg.textContent='処理中…';
    try{const snap=await db.collection('dogPosts').where('userId','==',p.userId).get();const b=db.batch();
      snap.docs.forEach(d=>b.update(d.ref,{isHidden:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}));
      await b.commit();msg.textContent=snap.size+' 件を非表示にしました。';
    }catch(err){msg.textContent='エラー：'+err.message;}};
  return div;
}
</script>
</body>
</html>
