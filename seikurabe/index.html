<!DOCTYPE html>

<head>

  <title>せいくらべ | T.K Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
      background: #fff9f0;
      color: #4d4038;
      line-height: 1.8;
    }
    header {
      background: linear-gradient(135deg, #fff3df 0%, #ffe4d9 100%);
      text-align: center;
      padding: 56px 20px 48px;
      border-bottom: 1px solid #f4dfce;
    }
    header .back {
      display: inline-block;
      margin-bottom: 18px;
      color: #8b7568;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .logo-mark {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }
    .dot { display: block; border-radius: 999px; }
    .green { width: 34px; height: 34px; background: #9bcfab; transform: translateY(10px); }
    .yellow { width: 42px; height: 42px; background: #ffd267; transform: translateY(2px); }
    .orange { width: 52px; height: 52px; background: #ff9f86; transform: translateY(-8px); }
    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #4d4038;
    }
    header p { margin-top: 10px; color: #7b6a61; }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 44px 20px 72px;
    }
    .card {
      background: #fffdf8;
      border: 1px solid #f0e4d7;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 28px rgba(120, 84, 48, 0.08);
      margin-bottom: 24px;
    }
    h2 {
      color: #f0785f;
      font-size: 1.1rem;
      margin-bottom: 12px;
    }
    p { margin-bottom: 12px; }
    p:last-child { margin-bottom: 0; }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .link-card {
      display: block;
      background: #fff;
      border: 1px solid #f0e4d7;
      border-radius: 14px;
      padding: 18px;
      color: #4d4038;
      text-decoration: none;
      box-shadow: 0 4px 18px rgba(120, 84, 48, 0.06);
    }
    .link-card strong {
      display: block;
      color: #f0785f;
      margin-bottom: 4px;
    }
    .badge {
      display: inline-block;
      background: #fff0e8;
      color: #d96b55;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      margin-right: 6px;
      margin-top: 8px;
    }
    footer {
      text-align: center;
      padding: 32px 20px;
      color: #9a8a81;
      font-size: 0.85rem;
    }
    a { color: #d96b55; }

    <p>記録データは原則として端末内に保存され、バックアップファイルとして書き出すことができます。</p>
    <span class="badge">iOS</span>
    <span class="badge">成長記録</span>
    <span class="badge">写真</span>

  <section class="links">

<footer>
